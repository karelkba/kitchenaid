<html lang="nl">

<title>Groepskoken planner — Gratis versie</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
input[type=number] { -moz-appearance: textfield; appearance: textfield; }
input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
body { font-family: Arial, sans-serif; font-size: 12px; color: #222; background: #f2f2f0; }

header { background: #fff; border-bottom: 1px solid #ddd; padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
header h1 { font-size: 16px; font-weight: 700; margin-right: 8px; }
.header-veld { display: flex; align-items: center; gap: 6px; }
.header-veld label { font-size: 12px; color: #888; white-space: nowrap; }
header input { height: 30px; border: 1px solid #ddd; border-radius: 5px; padding: 0 10px; font-size: 13px; width: 200px; }

.main { padding: 16px 20px; }
.sectie-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #888; margin: 18px 0 6px; }
.sectie-titel { font-size: 17px; font-weight: 700; color: #222; margin: 0 0 12px; }

/* GROEPEN */
.groepen-wrap { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
.groep-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px 14px; min-width: 280px; }
.groep-card input.naam { font-size: 14px; font-weight: 700; border: none; border-bottom: 1px solid #ddd; width: 100%; margin-bottom: 10px; padding: 2px 0; outline: none; }
.groep-card input.naam:focus { border-bottom-color: #3a6e3a; }
.kolom-headers { display: flex; gap: 6px; margin-bottom: 4px; padding-left: 26px; }
.kolom-headers span { font-size: 10px; color: #aaa; text-align: right; width: 44px; flex-shrink: 0; }
.totaal-rij { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.totaal-rij .lbl { flex: 1; font-size: 13px; font-weight: 700; }
.totaal-rij input { height: 28px; text-align: right; border: 1px solid #ddd; border-radius: 4px; padding: 0 4px; font-size: 13px; width: 44px; flex-shrink: 0; }
.waarvan-label { font-size: 11px; color: #888; font-style: italic; margin-bottom: 6px; border-top: 1px solid #eee; padding-top: 8px; }
.dieet-rijen { display: flex; flex-direction: column; gap: 4px; }
.dieet-rij { display: flex; align-items: center; gap: 6px; }
.dieet-rij .dieet-lbl { flex: 1; min-width: 0; }
.dieet-rij input { height: 24px; text-align: right; border: 1px solid #e0e0e0; border-radius: 3px; padding: 0 4px; font-size: 11px; width: 44px; flex-shrink: 0; }
.normaal-berekend { display: flex; align-items: center; gap: 6px; margin-top: 6px; opacity: .45; font-size: 11px; color: #888; }
.normaal-berekend .dieet-lbl { flex: 1; }
.normaal-berekend span.val { width: 44px; text-align: right; flex-shrink: 0; }
.btn-verwijder { font-size: 11px; color: #b00; border: 1px solid #f5c0c0; background: #fff8f8; border-radius: 4px; padding: 3px 10px; cursor: pointer; height: 30px; }
.btn-verwijder:hover { background: #ffeaea; }
.btn-add-groep { background: #3a6e3a; color: #fff; border: none; border-radius: 6px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-add-groep:hover { background: #2d562d; }

/* BADGE */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.b-normaal  { background: #eee;    color: #444; }
.b-veg      { background: #EAF3DE; color: #3B6D11; }
.b-gluten   { background: #FAEEDA; color: #854F0B; }
.b-lactose  { background: #E6F1FB; color: #185FA5; }

/* INGREDIËNTEN BLOK */
.ing-blok { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
.ing-blok-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.ing-blok-header .info { font-size: 11px; color: #888; }
.ing-tabel { width: 100%; border-collapse: collapse; }
.ing-tabel th { font-size: 10px; font-weight: 600; color: #888; padding: 3px 6px; border-bottom: 1px solid #eee; }
.ing-tabel th.l { text-align: left; }
.ing-tabel th.r { text-align: right; }
.ing-tabel td { padding: 3px 4px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
.ing-tabel td input[type=text]   { height: 26px; border: 1px solid #e0e0e0; border-radius: 4px; padding: 0 6px; font-size: 12px; width: 100%; }
.ing-tabel td input[type=number] { height: 26px; border: 1px solid #e0e0e0; border-radius: 4px; padding: 0 6px; font-size: 12px; width: 100%; text-align: right; }
.ing-tabel td.totaal { font-size: 11px; color: #555; text-align: right; white-space: nowrap; padding-left: 8px; }
.btn-del-ing { color: #b00; border: 1px solid #f5c0c0; background: #fff8f8; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 700; width: 24px; height: 24px; padding: 0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.btn-del-ing:hover { background: #ffeaea; }
.groep-fout { border-color: #e8a0a0 !important; background: #fffafa !important; }
.groep-waarschuwing { background: #fef2f2; border: 1px solid #f5c0c0; border-radius: 5px; color: #b00; font-size: 11px; padding: 5px 8px; margin-top: 8px; }
.btn-copy { font-size: 11px; border: 1px solid #ddd; background: #fafafa; border-radius: 4px; padding: 3px 7px; cursor: pointer; color: #444; display:flex; align-items:center; gap:4px; white-space:nowrap; }
.btn-copy:hover { background: #f0f0f0; }
.btn-add-ing { font-size: 11px; color: #3a6e3a; border: 1px solid #b8d8b8; background: #f3fbf3; border-radius: 4px; padding: 3px 10px; cursor: pointer; margin-top: 6px; }
.btn-add-ing:hover { background: #e6f5e6; }

/* AUTOCOMPLETE */
.ac-wrap { position: relative; }
.ac-list { position: absolute; top: 100%; left: 0; min-width: 160px; background: #fff; border: 1px solid #bbb; border-top: none; border-radius: 0 0 5px 5px; z-index: 999; max-height: 180px; overflow-y: auto; box-shadow: 0 4px 8px rgba(0,0,0,.08); }
.ac-item { padding: 6px 10px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.ac-item:hover, .ac-item.active { background: #f0f7f0; color: #3a6e3a; }

/* OVERZICHT */
.overzicht-blok { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; overflow-x: auto; }
.overzicht-blok h3 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #333; }
.ov-tabel { border-collapse: collapse; font-size: 11px; white-space: nowrap; width: 100%; }
.ov-tabel th { padding: 5px 8px; border: 1px solid #ddd; background: #f5f5f5; font-size: 10px; font-weight: 600; text-align: right; }
.ov-tabel th.l { text-align: left; }
.ov-tabel td { padding: 5px 8px; border: 1px solid #eee; text-align: right; }
.ov-tabel td.l { text-align: left; }
.ov-tabel tfoot td { background: #f0f0f0; font-weight: 700; border-top: 2px solid #ccc; }
.ov-tabel .groepkop { background: #efefef; text-align: center; font-weight: 700; }
.leeg { color: #ccc; font-style: italic; font-size: 12px; }

.pdf-balk { display: flex; justify-content: flex-end; gap: 8px; align-items: center; margin-bottom: 10px; }
.btn-pdf { background: #1a4d8a; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-opslaan, .btn-laden {
  height: 30px; padding: 0 12px; border: 1px solid #ddd; border-radius: 5px;
  font-size: 12px; font-weight: 600; cursor: pointer; background: #fff;
  color: #333; display: inline-flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.btn-opslaan:hover, .btn-laden:hover { background: #f5f5f5; }

.btn-pdf:hover { background: #153f72; }

@media print {
  body { background: #fff; margin-top: 36px; }
  body::after { content: "groepskoken.be — gratis versie"; position: fixed; bottom: 8px; right: 12px; font-size: 9px; color: #bbb; font-family: Arial, sans-serif; }
  header { display: none !important; }
  .no-print { display: none !important; }
  .print-only { display: block !important; }
  .main { padding: 0; }

  /* Vaste gerecht+dag rechts bovenaan ELKE pagina */
  .print-fixed-info {
    display: block !important;
    position: fixed;
    top: 0; right: 0;
    font-size: 12px;
    font-weight: 700;
    color: #333;
    padding: 4px 8px;
    background: #fff;
  }

  /* Nieuwe pagina per sectie */
  .print-sectie { page-break-before: always; padding-top: 0; }
  .print-sectie:first-of-type { page-break-before: auto; }

  /* Koptekst bovenaan elke sectie (alleen sectienaam, links) */
  .print-sectie-header {
    display: flex !important;
    align-items: baseline;
    border-bottom: 1.5px solid #333;
    padding-bottom: 5px;
    margin-bottom: 12px;
  }
  .print-sectie-header .ph-sectie { font-size: 15px; font-weight: 700; }
  .print-sectie-header .ph-info { display: none; }

  .ing-blok { page-break-inside: avoid; }
  .overzicht-blok { overflow: visible; page-break-inside: avoid; }
  .groep-card { page-break-inside: avoid; }
  .sectie-titel { display: none; }
}
.print-only { display: none; }
.print-sectie-header { display: none; }
.print-running-header { display: none; }
.print-fixed-info { display: none; }

<script>

const CHECKOUT_URL = 'https://karelkba.lemonsqueezy.com/checkout/buy/76f92877-c0ed-4719-acc0-df0a11df9031';

// Genereer unieke instance ID voor dit toestel
function getInstanceId() {
  let id = localStorage.getItem(LS_INSTANCE);
  if (!id) {
    id = 'browser-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
    localStorage.setItem(LS_INSTANCE, id);
  }
  return id;
}

// Check of een opgeslagen licentie nog geldig is
function getLicentieStatus() {
  try {
    const data = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
    if (!data) return null;
    // Check vervaldatum
    if (data.verloopt && new Date(data.verloopt) < new Date()) return null;
    return data;
  } catch(e) { return null; }
}

async function valideerLicentie(code) {
  try {
    const resp = await fetch('https://api.lemonsqueezy.com/v1/licenses/validate', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + API_KEY,
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({
        license_key: code.trim().toUpperCase(),
        instance_name: getInstanceId()
      })
    });
    const data = await resp.json();
    return data;
  } catch(e) {
    return { valid: false, error: e.message };
  }
}

async function activeerLicentie(code) {
  try {
    const resp = await fetch('https://api.lemonsqueezy.com/v1/licenses/activate', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + API_KEY,
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({
        license_key: code.trim().toUpperCase(),
        instance_name: getInstanceId()
      })
    });
    const data = await resp.json();
    return data;
  } catch(e) {
    return { activated: false, error: e.message };
  }
}

function slaLicentieOp(code, verloopt) {
  localStorage.setItem(LS_KEY, JSON.stringify({
    code: code.trim().toUpperCase(),
    verloopt: verloopt,
    geactiveerd: new Date().toISOString()
  }));
}

function toonLicentieScherm() {
  const bestaand = getLicentieStatus();
  
  const overlay = document.createElement('div');
  overlay.id = 'licentie-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99999;display:flex;align-items:center;justify-content:center';
  
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:32px;max-width:420px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,0.2);text-align:center">
      <div style="font-size:36px;margin-bottom:12px">🍳</div>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:8px;color:#222">Groepskoken planner</h2>
      <p style="font-size:13px;color:#666;margin-bottom:24px">Voer je licentiecode in om de volledige versie te activeren.</p>
      
      <input type="text" id="licentie-input" placeholder="XXXX-XXXX-XXXX-XXXX" 
        style="width:100%;height:42px;border:2px solid #ddd;border-radius:6px;padding:0 12px;font-size:14px;text-align:center;letter-spacing:1px;margin-bottom:8px;box-sizing:border-box">
      <div id="licentie-fout" style="font-size:12px;color:#b00;min-height:18px;margin-bottom:12px"></div>
      
      <button id="licentie-btn" onclick="licentieActiveren()"
        style="width:100%;height:42px;background:#3a6e3a;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px">
        ✓ Activeer volledige versie
      </button>
      
      <div style="border-top:1px solid #eee;padding-top:16px;margin-top:4px">
        <p style="font-size:12px;color:#888;margin-bottom:10px">Nog geen licentie?</p>
        <a href="https://karelkba.lemonsqueezy.com/checkout/buy/76f92877-c0ed-4719-acc0-df0a11df9031" target="_blank"

          ⭐ Koop volledige versie — €9.99
        </a>
        <button onclick="document.getElementById('licentie-overlay').remove()"

          Verder in gratis versie
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  
  // Auto-focus
  setTimeout(() => {
    const inp = document.getElementById('licentie-input');
    if (inp) inp.focus();
  }, 100);
}

async function licentieActiveren() {
  const input = document.getElementById('licentie-input');
  const fout = document.getElementById('licentie-fout');
  const btn = document.getElementById('licentie-btn');
  const code = input ? input.value.trim() : '';
  
  if (!code) { if(fout) fout.textContent = 'Voer een licentiecode in.'; return; }
  
  btn.textContent = 'Bezig...';
  btn.disabled = true;
  if(fout) fout.textContent = '';
  
  // Probeer eerst te activeren, dan te valideren
  let result = await activeerLicentie(code);
  
  if (result.activated) {
    const verloopt = result.license_key && result.license_key.expires_at ? result.license_key.expires_at : null;
    slaLicentieOp(code, verloopt);
    document.getElementById('licentie-overlay').remove();
    ontgrendelVolledigeVersie();
    toonMelding('Volledige versie geactiveerd! Welkom.', false);
  } else if (result.error && result.error.includes('already')) {
    // Al geactiveerd op dit toestel - valideer
    let val = await valideerLicentie(code);
    if (val.valid) {
      const verloopt = val.license_key && val.license_key.expires_at ? val.license_key.expires_at : null;
      slaLicentieOp(code, verloopt);
      document.getElementById('licentie-overlay').remove();
      ontgrendelVolledigeVersie();
      toonMelding('Licentie hersteld!', false);
    } else {
      btn.textContent = '✓ Activeer volledige versie';
      btn.disabled = false;
      if(fout) fout.textContent = 'Ongeldige licentiecode. Controleer de code uit je bestelmail.';
    }
  } else {
    btn.textContent = '✓ Activeer volledige versie';
    btn.disabled = false;
    const msg = result.error || (result.errors && result.errors[0] && result.errors[0].detail) || 'Ongeldige code.';
    if(fout) fout.textContent = msg;
  }
}

function ontgrendelVolledigeVersie() {
  // Verwijder GRATIS flag — herlaad de pagina zodat alles opnieuw rendert zonder beperkingen
  // We slaan op dat de versie ontgrendeld is en herladen
  localStorage.setItem('gk_volledig', '1');
  location.reload();
}

// ── START: check licentie bij laden ───────────────────
(function() {
  const volledig = localStorage.getItem('gk_volledig');
  const licentie = getLicentieStatus();
  
  if (volledig && licentie) {

  ).join('\n');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function getTotalen() {
  const t = { totaal_kind:0, totaal_volw:0, kok_kind:0, kok_volw:0 };
  getAlle().forEach(d => { t[d.id+'_kind']=0; t[d.id+'_volw']=0; t['kok_'+d.id+'_kind']=0; t['kok_'+d.id+'_volw']=0; });
  groepen.forEach(g => {
    t.totaal_kind += g.totaal_kind||0;
    t.totaal_volw += g.totaal_volw||0;
    getSpecials().forEach(d => {
      t[d.id+'_kind'] += g[d.id+'_kind']||0;
      t[d.id+'_volw'] += g[d.id+'_volw']||0;
    });
    // Kok-totalen: alleen groepen die NIET zelf koken
    if (!g.kookt_zelf) {
      t.kok_kind += g.totaal_kind||0;
      t.kok_volw += g.totaal_volw||0;
      getSpecials().forEach(d => {
        t['kok_'+d.id+'_kind'] += g[d.id+'_kind']||0;
        t['kok_'+d.id+'_volw'] += g[d.id+'_volw']||0;
      });
    }
  });
  t.normaal_kind = Math.max(0, t.totaal_kind - getSpecials().reduce((s,d)=>s+(t[d.id+'_kind']||0),0));
  t.normaal_volw = Math.max(0, t.totaal_volw - getSpecials().reduce((s,d)=>s+(t[d.id+'_volw']||0),0));
  t.kok_normaal_kind = Math.max(0, t.kok_kind - getSpecials().reduce((s,d)=>s+(t['kok_'+d.id+'_kind']||0),0));
  t.kok_normaal_volw = Math.max(0, t.kok_volw - getSpecials().reduce((s,d)=>s+(t['kok_'+d.id+'_volw']||0),0));
  return t;
}

function getBekendeIngs() {
  const map = {};
  getAlle().forEach(d => {
    (ingredienten[d.id]||[]).forEach(ing => {
      if (!ing.naam) return;
      const k = ing.naam.trim().toLowerCase();
      if (!map[k]) map[k] = { naam: ing.naam, eenheid: ing.eenheid||'', per_kind: ing.per_kind||0, per_volw: ing.per_volw||0 };
    });
  });
  return map;
}

function ingToevoegen(did) {

  ingredienten[did].push({ naam:'', eenheid:'', per_kind:0, per_volw:0 });

// ── AUTOCOMPLETE ───────────────────────────────────────
function acInput(input, did, ii) {
  const val = input.value;
  ingredienten[did][ii].naam = val;
  const valL = val.trim().toLowerCase();
  const list = input.parentElement.querySelector('.ac-list');
  if (!valL) { list.style.display='none'; return; }

  const bekende = getBekendeIngs();
  const matches = Object.values(bekende).filter(b =>
    b.naam.toLowerCase().includes(valL) && b.naam !== val
  );
  if (!matches.length) { list.style.display='none'; return; }

  list.innerHTML = matches.map(b =>
    `<div class="ac-item" data-naam="${esc(b.naam)}" data-eenheid="${esc(b.eenheid)}" data-pk="${b.per_kind}" data-pv="${b.per_volw}">${esc(b.naam)}</div>`
  ).join('');
  list.style.display = 'block';

  // Gebruik mousedown zodat blur niet eerder vuurt
  list.querySelectorAll('.ac-item').forEach(item => {
    item.addEventListener('mousedown', function(e) {
      e.preventDefault();
      acKies(this, did, ii);
    });
  });
}

function acKies(item, did, ii) {
  ingredienten[did][ii].naam     = item.dataset.naam;
  ingredienten[did][ii].eenheid  = item.dataset.eenheid || '';
  ingredienten[did][ii].per_kind = parseFloat(item.dataset.pk) || 0;
  ingredienten[did][ii].per_volw = parseFloat(item.dataset.pv) || 0;
  renderAlles();
}

function acHide(input) {
  setTimeout(() => {
    const list = input.parentElement.querySelector('.ac-list');
    if (list) list.style.display = 'none';
  }, 200);
}

function acKey(e, input, did, ii) {
  const list = input.parentElement.querySelector('.ac-list');
  if (!list || list.style.display==='none') return;
  const items = list.querySelectorAll('.ac-item');
  let active = list.querySelector('.ac-item.active');
  if (e.key==='ArrowDown') {
    e.preventDefault();
    if (!active) { items[0] && items[0].classList.add('active'); }
    else { active.classList.remove('active'); (active.nextElementSibling||items[0]).classList.add('active'); }
  } else if (e.key==='ArrowUp') {
    e.preventDefault();
    if (!active) { items[items.length-1] && items[items.length-1].classList.add('active'); }
    else { active.classList.remove('active'); (active.previousElementSibling||items[items.length-1]).classList.add('active'); }
  } else if (e.key==='Enter' && active) {
    e.preventDefault();
    acKies(active, did, ii);
  } else if (e.key==='Escape') {
    list.style.display='none';
  }
}

function toonMelding(tekst, fout) {
  let el = document.getElementById('copy-melding');
  if (!el) {
    el = document.createElement('div');
    el.id = 'copy-melding';
    el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:opacity .3s';
    document.body.appendChild(el);
  }
  el.textContent = tekst;
  el.style.background = fout ? '#fef2f2' : '#f0f7f0';
  el.style.color = fout ? '#b00' : '#3a6e3a';
  el.style.border = fout ? '1px solid #f5c0c0' : '1px solid #b8d8b8';
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

function copyIngs(vanDid, naarDid) {
  const getLabel = id => (getAlle().find(d=>d.id===id)||{label:id}).label;
  const bron = (ingredienten[vanDid]||[]).filter(i => i.naam);
  if (!bron.length) { toonMelding('Geen ingrediënten in ' + getLabel(vanDid) + '.', true); return; }
  if (!ingredienten[naarDid]) ingredienten[naarDid] = [];
  const bestaandeNamen = new Set(ingredienten[naarDid].map(i => i.naam.trim().toLowerCase()));
  let nieuw = 0;
  bron.forEach(ing => {
    if (bestaandeNamen.has(ing.naam.trim().toLowerCase())) return;
    ingredienten[naarDid].push({ naam: ing.naam, eenheid: ing.eenheid||'', per_kind: ing.per_kind||0, per_volw: ing.per_volw||0 });
    nieuw++;
  });
  if (nieuw === 0) toonMelding('Alle ingrediënten staan al in ' + getLabel(naarDid) + '.', true);
  else toonMelding(nieuw + ' ingredient' + (nieuw>1?'en':'') + ' gekopieerd naar ' + getLabel(naarDid) + '.', false);
  renderAlles();
}

function getPdfNaam() {
  const gerecht = document.getElementById('gerecht').value;
  const dag     = document.getElementById('dag').value;
  return [gerecht, dag].filter(Boolean).join('-').replace(/[^a-zA-Z0-9\-]/g, '_') || 'groepskoken';
}

function afdrukken() {
  const origTitel = document.title;
  document.title = getPdfNaam();
  window.print();
  document.title = origTitel;
}

function resetAlles() {
  if (!confirm('Alles wissen en opnieuw beginnen?')) return;
  groepen = [];
  ingredienten = { normaal:[], vegetarisch:[], glutenvrij:[], lactosevrij:[] };
  prijzen = {};
  customSpecials = [];
  document.getElementById('gerecht').value = '';
  document.getElementById('dag').value = '';
  injectDieetStyles();
  updatePrintHeaders();
  groepToevoegen(); // start met 1 lege groep
  toonMelding('Alles gewist. Nieuwe voorbereiding gestart.', false);
}

// ── OPSLAAN / LADEN ────────────────────────────────────
function opslaanData() {
  const data = {
    versie: 1,
    gerecht: document.getElementById('gerecht').value,
    dag: document.getElementById('dag').value,
    groepen,
    ingredienten,
    prijzen,
    customSpecials
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = getPdfNaam() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toonMelding('Opgeslagen als ' + a.download, false);
}

function ladenData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.versie) throw new Error('Ongeldig bestand');
      document.getElementById('gerecht').value = data.gerecht || '';
      document.getElementById('dag').value     = data.dag     || '';
      groepen      = data.groepen      || [];
      ingredienten = data.ingredienten || { normaal:[], vegetarisch:[], glutenvrij:[], lactosevrij:[] };
      prijzen      = data.prijzen      || {};
      customSpecials = data.customSpecials || [];
      injectDieetStyles();
      updatePrintHeaders();
      renderAlles();
      toonMelding('Geladen: ' + (data.gerecht || file.name), false);
    } catch(err) {
      toonMelding('Fout bij laden: ' + err.message, true);
    }
    // Reset input zodat hetzelfde bestand opnieuw geladen kan worden
    event.target.value = '';
  };
  reader.readAsText(file);
}

  renderGroepen();

  renderOverzicht();
}

// Start met 1 groep klaar
injectDieetStyles();
groepToevoegen();

// Toon licentie badge
(function() {
  const badge = document.getElementById('licentie-status-badge');
  const licentie = getLicentieStatus();
  if (badge) {
    if (window._LICENTIE_GELDIG && licentie) {
      badge.innerHTML = '<span style="font-size:10px;font-weight:700;background:#e8f5e8;color:#3a6e3a;padding:2px 8px;border-radius:4px;border:1px solid #b8d8b8">✓ VOLLEDIG</span>';
      const btn = document.getElementById('btn-licentie');
      if (btn) { btn.textContent = '✓ Geactiveerd'; btn.style.background='#e8f5e8'; btn.style.color='#3a6e3a'; btn.style.border='1px solid #b8d8b8'; }
    } else {
      badge.innerHTML = '<span style="font-size:10px;font-weight:700;background:#f5c542;color:#7a5c00;padding:2px 8px;border-radius:4px">GRATIS VERSIE</span>';
    }
  }
})();
</script>
